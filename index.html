<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Mission Board</title>
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #111418;
            --accent: #58a6ff; /* Tech Blue */
            --highlight: #3fb950; /* Mission Green */
            --text: #e6edf3;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: left;
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, var(--accent), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Vision Board Grid */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 150px;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Making some cards bigger for the "Vision Board" look */
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        .card-time {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--highlight);
            font-weight: bold;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: auto;
        }

        .icon {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Birthday_Weekend.v3</h1>
        <p style="color: #8b949e; font-size: 0.9rem;">System Status: Optimization Complete</p>
    </div>

<div class="board-grid">
    
    <a href="LINK_1" class="card wide" style="IMG_9998.jpeg: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hotel.jpg');">
        <span class="icon">🏨</span>
        <div class="content">
            <div class="card-time">Friday | 18:00</div>
            <div class="card-title">Base Station</div>
            <div class="card-desc">Check-in & System Initialization.</div>
        </div>
    </a>

    <a href="LINK_2" class="card tall" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hiking.jpg');">
        <span class="icon">⛰️</span>
        <div class="content">
            <div class="card-time">Saturday | 10:00</div>
            <div class="card-title">Outdoor Module</div>
            <div class="card-desc">Deploying to adventure coordinates.</div>
        </div>
    </a>

    <a href="LINK_3" class="card" style="background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('burger.jpg');">
        <span class="icon">🍔</span>
        <div class="content">
            <div class="card-time">Sat | 13:30</div>
            <div class="card-title">Refuel</div>
            <div class="card-desc">Casual node.</div>
        </div>
    </a>

    <a href="LINK_4" class="card" style="background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('dinner.jpg');">
        <span class="icon">🥂</span>
        <div class="content">
            <div class="card-time">Sat | 19:00</div>
            <div class="card-title">Dining</div>
            <div class="card-desc">Fine dining logic.</div>
        </div>
    </a>

</div>

        </a>

    </div>

</body>
</html>
